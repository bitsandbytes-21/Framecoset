<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bias Annotator</title>
    <meta name="description" content="AI Media Bias Evaluation Platform" />
    <script>
      try {
        var saved = localStorage.getItem('bias-annotator-dark-mode');
        var dark = saved === null ? true : JSON.parse(saved);
        if (!dark) document.documentElement.classList.remove('dark');
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
